name: Build XXpong IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    # Используем macos-12, так как в ней установлена стабильная версия Xcode 14.2,
    # способная компилировать старый синтаксис Swift и поддерживать развертывание на iOS 7.
    runs-on: macos-12

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set Xcode Version
      run: |
        sudo xcode-select -s /Applications/Xcode_14.2.app/Contents/Developer
        xcodebuild -version

    - name: Build Xcode Project
      run: |
        # Собираем проект под архитектуры armv7 (для iPhone 4/4s/5) и arm64 (для iPhone 5s)
        xcodebuild clean build \
          -project "XXpong.xcodeproj" \
          -scheme "XXpong" \
          -sdk iphoneos \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          ARCHS="armv7 arm64" \
          IPHONEOS_DEPLOYMENT_TARGET=7.1 \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Packaging to IPA
      run: |
        # Структурируем папки для генерации правильного .ipa контейнера
        mkdir -p build/Payload
        
        # Находим скомпилированное приложение .app и копируем его в папку Payload
        if [ -d "build/Release-iphoneos/XXpong.app" ]; then
          cp -r build/Release-iphoneos/XXpong.app build/Payload/
        else
          # Если Xcode сохранил билд в стандартную папку DerivedData, забираем его оттуда
          cp -r ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/XXpong.app build/Payload/
        fi
        
        # Архивируем в .ipa
        cd build
        zip -r XXpong.ipa Payload/

    - name: Upload XXpong IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XXpong-ios7-unsigned-ipa
        path: build/XXpong.ipa
